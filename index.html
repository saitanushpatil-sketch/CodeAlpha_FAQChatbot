<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>J.A.R.V.I.S — FAQ Assistant · CodeAlpha</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="bg-grid"></div>
<div class="jarvis-wrap">
  <div class="scan-line"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="hud-header">
    <div class="arc-ring"><div class="arc-inner"><div class="arc-dot"></div></div></div>
    <div class="hud-title">
      <h1>J.A.R.V.I.S</h1>
      <p>Just A Rather Very Intelligent System · FAQ Module</p>
    </div>
    <div class="sys-status">
      <div class="sys-row"><div class="sys-dot"></div>NLP ENGINE ONLINE</div>
      <div class="sys-row"><div class="sys-dot amber"></div>SEMANTIC CORE READY</div>
    </div>
  </div>
  <div class="hud-divider"></div>
  <div class="chat-body" id="chatBody">
    <div class="msg bot">
      <div class="msg-icon">JAR</div>
      <div class="bubble-col">
        <div class="bubble">Good day. I am J.A.R.V.I.S — your FAQ intelligence module.<br><br>How may I assist you, sir?</div>
        <div class="msg-time" id="initTime"></div>
      </div>
    </div>
  </div>
  <div class="sugg-section">
    <div class="sugg-label">► QUICK QUERIES</div>
    <div class="sugg-wrap">
      <button class="sugg-btn" onclick="useSugg('How do I reset my password?')">Reset password</button>
      <button class="sugg-btn" onclick="useSugg('What are the pricing plans?')">Pricing plans</button>
      <button class="sugg-btn" onclick="useSugg('How do I contact support?')">Contact support</button>
      <button class="sugg-btn" onclick="useSugg('Can I cancel my subscription?')">Cancel subscription</button>
      <button class="sugg-btn" onclick="useSugg('Is my data secure?')">Data security</button>
      <button class="sugg-btn" onclick="useSugg('Do you offer a free trial?')">Free trial</button>
      <button class="sugg-btn" onclick="useSugg('Is there a mobile app?')">Mobile app</button>
      <button class="sugg-btn" onclick="useSugg('How do I export my data?')">Export data</button>
    </div>
  </div>
  <div class="input-zone">
    <textarea id="jarvisInput" placeholder="Enter query for J.A.R.V.I.S..." rows="1"></textarea>
    <button id="fireBtn" onclick="fire()" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
  <div class="hud-footer">STARK INDUSTRIES · TASK 2 · P.SAI TANUSH · CA/DF1/99929 · CODEALPHA AI INTERNSHIP 2026</div>
</div>

<script>
const FAQ=[
  {q:"How do I reset my password?",a:"To reset your password, click 'Forgot Password' on the login page. You'll receive an email with a reset link valid for 24 hours. Click it and set your new password."},
  {q:"What are the pricing plans?",a:"We offer three plans: Free (basic features, up to 5 projects), Pro ($12/month, unlimited projects + priority support), and Enterprise (custom pricing with SLA guarantees)."},
  {q:"How do I contact support?",a:"Reach our support team via live chat (Mon–Fri, 9 AM–6 PM IST), email at support@company.com, or by submitting a ticket through your dashboard."},
  {q:"Can I cancel my subscription anytime?",a:"Yes. Cancel anytime from Settings → Billing → Cancel Subscription. Your access continues until the end of the current billing period with no extra charges."},
  {q:"Is my data secure?",a:"Absolutely. We use AES-256 encryption for stored data, TLS 1.3 for data in transit, and undergo regular third-party security audits. We are SOC 2 Type II certified."},
  {q:"How do I upgrade my plan?",a:"Go to Settings → Billing → Upgrade Plan. You'll be charged a prorated amount for the current period, and new features activate immediately."},
  {q:"Do you offer a free trial?",a:"Yes. The Pro plan comes with a 14-day free trial. No credit card required. You'll be notified before the trial ends."},
  {q:"How many users can I add?",a:"Free plans support 1 user. Pro plans support up to 10 team members. Enterprise plans have unlimited seats. Manage from Settings → Team."},
  {q:"What payment methods do you accept?",a:"We accept Visa, Mastercard, Amex, UPI, net banking, and PayPal. Enterprise plans also support invoicing and bank transfers."},
  {q:"How do I export my data?",a:"Go to Settings → Data Management → Export. Choose CSV, JSON, or PDF. Large exports are emailed to you within 30 minutes."},
  {q:"Is there a mobile app?",a:"Yes. Available on iOS (App Store) and Android (Google Play). Supports all core features including real-time notifications and offline mode."},
  {q:"How do I integrate with third-party tools?",a:"We support 50+ integrations including Slack, Zapier, Google Workspace, GitHub, and Jira. Go to Settings → Integrations to connect with one click."},
  {q:"How do I delete my account?",a:"Go to Settings → Account → Delete Account. This is irreversible and removes all your data within 30 days per our data retention policy."},
  {q:"Do you have an API?",a:"Yes. We provide a REST API with full documentation at docs.company.com/api. API keys can be generated from Settings → Developer → API Keys."}
];

const STOP=new Set(['i','me','my','the','a','an','is','it','do','how','can','what','when','where','why','to','for','of','in','on','and','or','are','was','be','have','has','did','will','with','that','this','your','you','we','our','which','if','not','no','so','at','by','from','about']);

function tokenize(t){
  const f=new Map();
  t.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w=>w.length>1&&!STOP.has(w)).forEach(w=>f.set(w,(f.get(w)||0)+1));
  return f;
}

function cosine(a,b){
  let dot=0,mA=0,mB=0;
  const all=new Set([...a.keys(),...b.keys()]);
  for(const t of all){const va=a.get(t)||0,vb=b.get(t)||0;dot+=va*vb;mA+=va*va;mB+=vb*vb;}
  return mA&&mB?dot/(Math.sqrt(mA)*Math.sqrt(mB)):0;
}

function bestMatch(q){
  const qv=tokenize(q);
  let best=null,bs=-1;
  for(const f of FAQ){
    const s=cosine(qv,tokenize(f.q+' '+f.a));
    if(s>bs){bs=s;best=f;}
  }
  return{faq:best,score:bs};
}

function getTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
document.getElementById('initTime').textContent=getTime();

function scrollBot(){const b=document.getElementById('chatBody');b.scrollTop=b.scrollHeight;}

function appendMsg(role,html,conf=null){
  const body=document.getElementById('chatBody');
  const d=document.createElement('div');d.className='msg '+role;
  const label=role==='bot'?'JAR':'YOU';
  let extra='';
  if(conf!==null&&role==='bot'){
    const pct=Math.min(Math.round(conf*100),98);
    const col=pct>=70?'#f0a500':pct>=40?'#e74c3c':'#666';
    extra='<div class="conf-row"><div class="conf-track"><div class="conf-bar" style="width:'+pct+'%;background:'+col+'"></div></div><span class="conf-pct">MATCH: '+pct+'%</span></div>';
  }
  d.innerHTML='<div class="msg-icon">'+label+'</div><div class="bubble-col"><div class="bubble">'+html+extra+'</div><div class="msg-time">'+getTime()+'</div></div>';
  body.appendChild(d);scrollBot();
}

function showTyping(){
  const body=document.getElementById('chatBody');
  const d=document.createElement('div');d.className='msg bot';d.id='typing';
  d.innerHTML='<div class="msg-icon">JAR</div><div class="bubble-col"><div class="bubble typing-bubble"><span></span><span></span><span></span></div></div>';
  body.appendChild(d);scrollBot();
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

let busy=false;

async function fire(){
  if(busy)return;
  const inp=document.getElementById('jarvisInput');
  const q=inp.value.trim();
  if(!q)return;
  busy=true;
  document.getElementById('fireBtn').disabled=true;
  inp.value='';inp.style.height='auto';
  appendMsg('user',q);
  showTyping();
  await new Promise(r=>setTimeout(r,700));
  try{
    const{faq,score}=bestMatch(q);
    removeTyping();
    const reply=score<0.05?"I'm afraid that query falls outside my current knowledge base, sir. I recommend contacting support directly.":faq.a;
    appendMsg('bot',reply,Math.min(score+0.3,0.98));
  }catch(e){
    removeTyping();
    appendMsg('bot',"Systems error detected, sir. Please try again.");
  }
  busy=false;
  document.getElementById('fireBtn').disabled=false;
  inp.focus();
}

function useSugg(text){document.getElementById('jarvisInput').value=text;fire();}

document.getElementById('jarvisInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();fire();}
});
document.getElementById('jarvisInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});
</script>
</body>
</html>
